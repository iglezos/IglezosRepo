<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin="">
    </script>

    <script>
    // Default view (Athens)
    window._map = L.map('map').setView([37.9838, 23.7275], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(window._map);

    window._userMarker = null;

    // Called from C# to move map to user's location
    window.setUserLocation = function(lat, lng) {
      try {
        const pos = [lat, lng];
        window._map.setView(pos, 16);

        if (window._userMarker) {
          window._userMarker.setLatLng(pos);
        } else {
          window._userMarker = L.marker(pos).addTo(window._map);
          window._userMarker.bindPopup("You are here");
        }

        window._userMarker.openPopup();
        return "ok";
      } catch (e) {
        return "error: " + e;
      }
    };
    </script>
</body>
</html>
